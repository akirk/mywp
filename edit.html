<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit repos - my.wordpress.net</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #fff;
    --text: #1a1a2e;
    --text-muted: #6c757d;
    --border: #e2e8f0;
    --accent: #3b82f6;
    --danger: #ef4444;
    --success: #10b981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1 { font-size: 1.5rem; font-weight: 600; }
  h1 a { color: inherit; text-decoration: none; }
  h1 a:hover { color: var(--accent); }

  .back { font-size: 0.85rem; color: var(--text-muted); text-decoration: none; }
  .back:hover { color: var(--accent); }

  .actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .btn {
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
  }

  .btn:hover { background: var(--bg); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { background: #2563eb; }

  .btn-danger {
    color: var(--danger);
    border-color: var(--danger);
  }

  .btn-danger:hover { background: #fef2f2; }

  .btn-success {
    background: var(--success);
    color: #fff;
    border-color: var(--success);
  }

  .btn-success:hover { background: #059669; }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    color: #fff;
    background: var(--text);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
  }

  .toast.show { opacity: 1; }

  .repo-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .repo-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .repo-card-title { font-weight: 600; font-size: 0.95rem; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .field-row.full { grid-template-columns: 1fr; }

  .field label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .field input {
    width: 100%;
    font-size: 0.85rem;
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
  }

  .field input:focus { outline: none; border-color: var(--accent); }

  .labels-section {
    margin-top: 0.5rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .labels-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .label-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.4rem;
  }

  .label-row input { flex: 1; }

  .label-row input.label-key {
    max-width: 140px;
    font-size: 0.8rem;
    padding: 0.25rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
  }

  .label-row input.label-val {
    font-size: 0.8rem;
    padding: 0.25rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
  }

  .label-row button {
    font-size: 0.75rem;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.2rem;
  }

  .label-row button:hover { color: var(--danger); }

  .add-label-btn {
    font-size: 0.75rem;
    border: 1px dashed var(--border);
    background: none;
    color: var(--text-muted);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 0.25rem;
  }

  .add-label-btn:hover { border-color: var(--accent); color: var(--accent); }

  .override-banner {
    background: #dbeafe;
    color: #1e40af;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .override-banner button {
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid #93c5fd;
    border-radius: 4px;
    background: #eff6ff;
    color: #1e40af;
    cursor: pointer;
  }

  .json-preview {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 1.5rem;
    display: none;
  }

  .json-preview pre {
    font-size: 0.8rem;
    overflow-x: auto;
    white-space: pre;
    color: var(--text);
    max-height: 400px;
    overflow-y: auto;
  }

  .json-preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .json-preview-header h3 { font-size: 0.9rem; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>Edit repos</h1>
  <a href="index.html" class="back">&larr; Back to dashboard</a>
</header>

<div class="actions">
  <button class="btn btn-primary" id="addRepoBtn">+ Add repo</button>
  <button class="btn btn-success" id="saveOverrideBtn">Save as local override</button>
  <button class="btn" id="previewJsonBtn">Preview JSON</button>
  <button class="btn" id="copyJsonBtn">Copy JSON</button>
  <a class="btn" id="editGithubLink" href="#" target="_blank">Edit on GitHub</a>
  <button class="btn btn-danger" id="clearOverrideBtn" style="display:none">Clear override</button>
</div>

<div id="overrideBanner"></div>
<div id="repoList"></div>

<div class="json-preview" id="jsonPreview">
  <div class="json-preview-header">
    <h3>repos.json</h3>
    <button class="btn" id="hidePreviewBtn">Hide</button>
  </div>
  <pre id="jsonPreviewContent"></pre>
</div>

<div class="toast" id="toast"></div>

<script>
const GITHUB_EDIT_URL = 'https://github.com/akirk/mywp/edit/main/repos.json';

let repos = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function buildJson() {
  return JSON.stringify({ repos }, null, 2) + '\n';
}

function updateOverrideBanner() {
  const banner = document.getElementById('overrideBanner');
  const clearBtn = document.getElementById('clearOverrideBtn');
  if (localStorage.getItem('repos_override')) {
    banner.innerHTML = `<div class="override-banner">
      Local override is active &mdash; the dashboard is using your edited config.
    </div>`;
    clearBtn.style.display = '';
  } else {
    banner.innerHTML = '';
    clearBtn.style.display = 'none';
  }
}

function renderRepoCard(repo, index) {
  const card = document.createElement('div');
  card.className = 'repo-card';

  const labels = repo.labels || {};
  const labelRows = Object.entries(labels).map(([k, v], li) => `
    <div class="label-row">
      <input class="label-key" value="${escAttr(k)}" data-repo="${index}" data-label-index="${li}" data-field="key" placeholder="key">
      <input class="label-val" value="${escAttr(v)}" data-repo="${index}" data-label-index="${li}" data-field="val" placeholder="value">
      <button data-repo="${index}" data-remove-label="${li}" title="Remove">&times;</button>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="repo-card-header">
      <span class="repo-card-title">${escHtml(repo.owner || '')}/${escHtml(repo.repo || '')}</span>
      <button class="btn btn-danger" data-remove-repo="${index}">Remove</button>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Owner</label>
        <input value="${escAttr(repo.owner || '')}" data-repo="${index}" data-field="owner" placeholder="e.g. akirk">
      </div>
      <div class="field">
        <label>Repository</label>
        <input value="${escAttr(repo.repo || '')}" data-repo="${index}" data-field="repo" placeholder="e.g. friends">
      </div>
    </div>
    <div class="field-row full">
      <div class="field">
        <label>GitHub Label (optional &mdash; filter PRs/issues by this label)</label>
        <input value="${escAttr(repo.githubLabel || '')}" data-repo="${index}" data-field="githubLabel" placeholder="e.g. [Feature] Personal Playground">
      </div>
    </div>
    <div class="labels-section">
      <div class="labels-title">Labels (for grouping/filtering)</div>
      ${labelRows}
      <button class="add-label-btn" data-repo="${index}" data-add-label>+ Add label</button>
    </div>
  `;
  return card;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function renderAll() {
  const list = document.getElementById('repoList');
  list.innerHTML = '';
  repos.forEach((repo, i) => list.appendChild(renderRepoCard(repo, i)));
}

// Event delegation
document.getElementById('repoList').addEventListener('input', (e) => {
  const el = e.target;
  const idx = parseInt(el.dataset.repo);
  if (isNaN(idx)) return;

  if (el.dataset.field === 'owner') repos[idx].owner = el.value;
  else if (el.dataset.field === 'repo') repos[idx].repo = el.value;
  else if (el.dataset.field === 'githubLabel') {
    repos[idx].githubLabel = el.value || undefined;
    if (!el.value) delete repos[idx].githubLabel;
  }
  else if (el.dataset.field === 'key' || el.dataset.field === 'val') {
    const li = parseInt(el.dataset.labelIndex);
    const entries = Object.entries(repos[idx].labels || {});
    if (el.dataset.field === 'key') {
      const oldKey = entries[li][0];
      const val = repos[idx].labels[oldKey];
      delete repos[idx].labels[oldKey];
      repos[idx].labels[el.value] = val;
    } else {
      entries[li][1] = el.value;
      repos[idx].labels[entries[li][0]] = el.value;
    }
  }

  // Update the card title live
  const card = el.closest('.repo-card');
  if (card) {
    const title = card.querySelector('.repo-card-title');
    title.textContent = `${repos[idx].owner || ''}/${repos[idx].repo || ''}`;
  }
});

document.getElementById('repoList').addEventListener('click', (e) => {
  const el = e.target;

  if (el.dataset.removeRepo !== undefined) {
    repos.splice(parseInt(el.dataset.removeRepo), 1);
    renderAll();
  }

  if (el.dataset.removeLabel !== undefined) {
    const idx = parseInt(el.dataset.repo);
    const entries = Object.entries(repos[idx].labels || {});
    const key = entries[parseInt(el.dataset.removeLabel)][0];
    delete repos[idx].labels[key];
    renderAll();
  }

  if (el.dataset.addLabel !== undefined) {
    const idx = parseInt(el.dataset.repo);
    if (!repos[idx].labels) repos[idx].labels = {};
    repos[idx].labels[''] = '';
    renderAll();
    // Focus the new key input
    const card = document.getElementById('repoList').children[idx];
    const keys = card.querySelectorAll('.label-key');
    keys[keys.length - 1].focus();
  }
});

document.getElementById('addRepoBtn').addEventListener('click', () => {
  repos.push({ owner: '', repo: '', labels: { maturity: '', audience: '', problemSpace: '' } });
  renderAll();
  // Focus the owner field of the new card
  const list = document.getElementById('repoList');
  const last = list.lastElementChild;
  if (last) last.querySelector('input[data-field="owner"]').focus();
});

document.getElementById('saveOverrideBtn').addEventListener('click', () => {
  localStorage.setItem('repos_override', buildJson());
  updateOverrideBanner();
  showToast('Saved! Dashboard will use this config.');
});

document.getElementById('clearOverrideBtn').addEventListener('click', () => {
  localStorage.removeItem('repos_override');
  updateOverrideBanner();
  showToast('Override cleared. Dashboard will use repos.json.');
});

document.getElementById('previewJsonBtn').addEventListener('click', () => {
  const preview = document.getElementById('jsonPreview');
  document.getElementById('jsonPreviewContent').textContent = buildJson();
  preview.style.display = 'block';
  preview.scrollIntoView({ behavior: 'smooth' });
});

document.getElementById('hidePreviewBtn').addEventListener('click', () => {
  document.getElementById('jsonPreview').style.display = 'none';
});

document.getElementById('copyJsonBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(buildJson()).then(() => showToast('JSON copied to clipboard!'));
});

document.getElementById('editGithubLink').href = GITHUB_EDIT_URL;

// Load initial data
async function init() {
  // Prefer override if it exists, otherwise fetch repos.json
  const override = localStorage.getItem('repos_override');
  if (override) {
    const config = JSON.parse(override);
    repos = config.repos || [];
  } else {
    try {
      const resp = await fetch('repos.json');
      const config = await resp.json();
      repos = config.repos || [];
    } catch (err) {
      repos = [];
    }
  }
  renderAll();
  updateOverrideBanner();
}

init();
</script>
</body>
</html>
