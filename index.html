<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my.wordpress.net Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>my.wordpress.net</h1>
  <div class="controls">
    <label for="groupBy">Group by:</label>
    <select id="groupBy">
      <option value="">None (sort by activity)</option>
      <option value="maturity">Maturity</option>
      <option value="audience">Audience</option>
      <option value="problemSpace">Problem Space</option>
    </select>
    <button class="btn" id="refreshBtn" title="Clear cache and refetch">&#8635; Refresh</button>
    <a href="timeline.html" class="btn">Timeline</a>
    <a href="edit.html" class="btn">Edit repos</a>
  </div>
  <div class="meta" id="metaInfo"></div>
</header>

<div id="app">
  <div class="loading"><div class="spinner"></div><br>Loading repos...</div>
</div>

<script src="utils.js"></script>
<script src="github.js"></script>
<script>
function daysSince(dateStr) {
  if (!dateStr) return Infinity;
  return Math.floor((Date.now() - new Date(dateStr)) / (1000 * 60 * 60 * 24));
}

function stalenessClass(days) {
  if (days <= 7) return 'fresh';
  if (days <= 30) return 'warm';
  if (days <= 90) return 'stale';
  return 'dormant';
}

function stalenessText(days) {
  if (days === Infinity) return 'No merges';
  if (days === 0) return 'Today';
  if (days === 1) return '1 day ago';
  return `${days} days ago`;
}

async function fetchRepoData(repoConfig) {
  const { owner, repo, githubLabel } = repoConfig;
  const base = `${API}/repos/${owner}/${repo}`;
  const fetches = [];

  if (githubLabel) {
    const labelEncoded = encodeURIComponent(githubLabel);
    fetches.push(
      cachedFetch(`${base}/issues?labels=${labelEncoded}&state=open&sort=updated&direction=desc&per_page=30`),
      cachedFetch(`${base}/issues?labels=${labelEncoded}&state=closed&sort=updated&direction=desc&per_page=30`)
    );
  } else {
    fetches.push(
      cachedFetch(`${base}/pulls?state=all&sort=updated&direction=desc&per_page=30`)
    );
  }

  const results = await Promise.all(fetches);
  const now = new Date();
  const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
  let openPRs, recentlyMerged, lastMergeDate, labeledIssues;

  if (githubLabel) {
    const openItems = results[0].data;
    const closedItems = results[1].data;
    openPRs = openItems.filter(item => item.pull_request);
    labeledIssues = openItems.filter(item => !item.pull_request);
    const closedPRs = closedItems.filter(item => item.pull_request);
    recentlyMerged = closedPRs.filter(item => new Date(item.closed_at) > thirtyDaysAgo);
    lastMergeDate = closedPRs.length > 0 ? closedPRs[0].closed_at : null;
  } else {
    const prs = results[0].data;
    const mergedPRs = prs.filter(pr => pr.merged_at);
    lastMergeDate = mergedPRs.length > 0 ? mergedPRs[0].merged_at : null;
    openPRs = prs.filter(pr => pr.state === 'open');
    recentlyMerged = mergedPRs.filter(pr => new Date(pr.merged_at) > thirtyDaysAgo);
    labeledIssues = [];
  }

  return {
    ...repoConfig, lastMergeDate,
    daysSinceLastMerge: daysSince(lastMergeDate),
    openPRs, recentlyMerged, labeledIssues,
    remaining: results[0].remaining, limit: results[0].limit,
    fromCache: results.every(r => r.fromCache),
  };
}

function buildCardContent(data) {
  const sc = stalenessClass(data.daysSinceLastMerge);
  const labelTags = Object.entries(data.labels || {})
    .map(([k, v]) => `<span class="label-tag">${escHtml(v)}</span>`).join('');
  const ghLabel = data.githubLabel
    ? `<span class="github-label-tag">${escHtml(data.githubLabel)}</span>` : '';

  let openPRsHTML = '';
  if (data.openPRs.length > 0) {
    const items = data.openPRs.map(pr =>
      `<li><span class="pr-dot open"></span><a href="${pr.html_url}" target="_blank">#${pr.number} ${escHtml(pr.title)}</a></li>`
    ).join('');
    openPRsHTML = `<div class="section">
      <div class="section-title">Open PRs <span class="open-count">(${data.openPRs.length})</span></div>
      <ul class="pr-list">${items}</ul></div>`;
  }

  let mergedHTML = '';
  if (data.recentlyMerged.length > 0) {
    const items = data.recentlyMerged.map(pr =>
      `<li><span class="pr-dot merged"></span><a href="${pr.html_url}" target="_blank">#${pr.number} ${escHtml(pr.title)}</a></li>`
    ).join('');
    mergedHTML = `<div class="section">
      <div class="section-title">Recently Merged (30d)</div>
      <ul class="pr-list">${items}</ul></div>`;
  }

  let labeledHTML = '';
  if (data.labeledIssues && data.labeledIssues.length > 0) {
    const items = data.labeledIssues.map(issue =>
      `<li><span class="pr-dot open"></span><a href="${issue.html_url}" target="_blank">#${issue.number} ${escHtml(issue.title)}</a></li>`
    ).join('');
    labeledHTML = `<div class="section">
      <div class="section-title">Labeled Issues: ${escHtml(data.githubLabel)} <span class="open-count">(${data.labeledIssues.length})</span></div>
      <ul class="pr-list">${items}</ul></div>`;
  }

  const noPRs = data.openPRs.length === 0 && data.recentlyMerged.length === 0
    && (!data.labeledIssues || data.labeledIssues.length === 0)
    ? '<div class="no-prs">No PR activity</div>' : '';

  return { sc, html: `
    <div class="card-header">
      <div>
        <div class="card-title"><a href="https://github.com/${data.owner}/${data.repo}" target="_blank">${escHtml(data.repo)}</a></div>
        <div class="card-owner">${escHtml(data.owner)}</div>
      </div>
      <span class="staleness-badge ${sc}">${stalenessText(data.daysSinceLastMerge)}</span>
    </div>
    <div class="label-tags">${labelTags}${ghLabel}</div>
    ${openPRsHTML}${mergedHTML}${labeledHTML}${noPRs}
  `};
}

function renderCard(data) {
  const { sc, html } = buildCardContent(data);
  const card = document.createElement('div');
  card.className = `card ${sc}`;
  card.innerHTML = html;

  // Check if content overflows
  requestAnimationFrame(() => {
    if (card.scrollHeight > card.clientHeight) {
      const fade = document.createElement('div');
      fade.className = 'card-fade';
      fade.innerHTML = '<button class="expand-btn">Show more</button>';
      fade.querySelector('.expand-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        showOverlay(data);
      });
      card.appendChild(fade);
    }
  });

  return card;
}

function showOverlay(data) {
  const { sc, html } = buildCardContent(data);
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `<div class="overlay-card ${sc}">
    <button class="overlay-close">&times;</button>
    ${html}
  </div>`;
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
  overlay.querySelector('.overlay-close').addEventListener('click', () => overlay.remove());
  document.addEventListener('keydown', function handler(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
  });
  document.body.appendChild(overlay);
}

function renderDashboard(repos, groupBy) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Override banner
  if (localStorage.getItem('repos_override')) {
    const banner = document.createElement('div');
    banner.className = 'override-banner';
    banner.innerHTML = `Using local repos.json override <button id="clearOverride">Clear override</button>`;
    app.appendChild(banner);
    banner.querySelector('#clearOverride').addEventListener('click', () => {
      localStorage.removeItem('repos_override');
      loadDashboard();
    });
  }

  if (!groupBy) {
    repos.sort((a, b) => a.daysSinceLastMerge - b.daysSinceLastMerge);
    const grid = document.createElement('div');
    grid.className = 'grid';
    repos.forEach(r => grid.appendChild(renderCard(r)));
    app.appendChild(grid);
  } else {
    const groups = {};
    repos.forEach(r => {
      const key = (r.labels && r.labels[groupBy]) || 'uncategorized';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    Object.keys(groups).sort().forEach(key => {
      const heading = document.createElement('h2');
      heading.className = 'group-heading';
      heading.textContent = key;
      app.appendChild(heading);
      const grid = document.createElement('div');
      grid.className = 'grid';
      groups[key].sort((a, b) => a.daysSinceLastMerge - b.daysSinceLastMerge)
        .forEach(r => grid.appendChild(renderCard(r)));
      app.appendChild(grid);
    });
  }
}

function updateMeta(repos) {
  const meta = document.getElementById('metaInfo');
  let lastFetched = null;
  for (const r of repos) {
    const suffix = r.githubLabel
      ? `issues?labels=${encodeURIComponent(r.githubLabel)}&state=open&sort=updated&direction=desc&per_page=30`
      : 'pulls?state=all&sort=updated&direction=desc&per_page=30';
    const key = cacheKey(`${API}/repos/${r.owner}/${r.repo}/${suffix}`);
    const cached = localStorage.getItem(key);
    if (cached) {
      const { ts } = JSON.parse(cached);
      if (!lastFetched || ts < lastFetched) lastFetched = ts;
    }
  }
  const remaining = repos.find(r => r.remaining !== undefined);
  let rateInfo = '';
  if (remaining && remaining.remaining !== undefined) {
    const pct = Math.round((remaining.remaining / remaining.limit) * 100);
    const warn = pct < 20 ? ' rate-warn' : '';
    rateInfo = ` · <span class="${warn}">API: ${remaining.remaining}/${remaining.limit} remaining</span>`;
  }
  const fetchedStr = lastFetched ? new Date(lastFetched).toLocaleTimeString() : 'just now';
  const allFromCache = repos.every(r => r.fromCache);
  const anyFromCache = repos.some(r => r.fromCache);
  const cacheNote = allFromCache ? '(cached)' : anyFromCache ? '(partially cached)' : '(live)';
  meta.innerHTML = `Last fetched: ${fetchedStr} ${cacheNote}${rateInfo}`;
}

let repoData = [];

async function loadDashboard(forceRefresh = false) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading repos...</div>';

  try {
    const config = await loadReposConfig();

    if (forceRefresh) clearCache();

    const results = await Promise.allSettled(config.repos.map(r => fetchRepoData(r)));
    const errors = [];
    repoData = [];
    results.forEach((result, i) => {
      if (result.status === 'fulfilled') repoData.push(result.value);
      else errors.push(`${config.repos[i].owner}/${config.repos[i].repo}: ${result.reason.message}`);
    });

    if (errors.length > 0) {
      const banner = document.createElement('div');
      banner.className = 'error-banner';
      banner.textContent = `Failed to fetch: ${errors.join('; ')}`;
      app.innerHTML = '';
      app.appendChild(banner);
    }

    renderDashboard(repoData, document.getElementById('groupBy').value);
    updateMeta(repoData);
  } catch (err) {
    app.innerHTML = `<div class="error-banner">Failed to load: ${escHtml(err.message)}</div>`;
  }
}

// Persist groupBy
const savedGroupBy = localStorage.getItem('dashboard_groupBy');
if (savedGroupBy) document.getElementById('groupBy').value = savedGroupBy;

document.getElementById('groupBy').addEventListener('change', () => {
  const val = document.getElementById('groupBy').value;
  localStorage.setItem('dashboard_groupBy', val);
  if (repoData.length > 0) renderDashboard(repoData, val);
});

document.getElementById('refreshBtn').addEventListener('click', () => loadDashboard(true));

loadDashboard();
</script>
</body>
</html>
